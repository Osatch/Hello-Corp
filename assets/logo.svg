<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1a2f4a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </radialGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93d4f7"/>
      <stop offset="100%" stop-color="#3b9fd6"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="150" cy="150" r="150" fill="url(#bg)"/>

  <!-- Globe outline -->
  <circle cx="150" cy="130" r="62" fill="none" stroke="url(#blue)" stroke-width="2.5"/>

  <!-- Globe latitude lines -->
  <ellipse cx="150" cy="112" rx="62" ry="20" fill="none" stroke="#60b8e0" stroke-width="1.4" opacity="0.75"/>
  <ellipse cx="150" cy="130" rx="62" ry="32" fill="none" stroke="#60b8e0" stroke-width="1.4" opacity="0.55"/>
  <ellipse cx="150" cy="148" rx="62" ry="20" fill="none" stroke="#60b8e0" stroke-width="1.4" opacity="0.75"/>

  <!-- Globe longitude lines -->
  <ellipse cx="150" cy="130" rx="24" ry="62" fill="none" stroke="#60b8e0" stroke-width="1.4" opacity="0.75"/>
  <ellipse cx="150" cy="130" rx="46" ry="62" fill="none" stroke="#60b8e0" stroke-width="1.4" opacity="0.55"/>

  <!-- Globe center lines -->
  <line x1="150" y1="68" x2="150" y2="192" stroke="#60b8e0" stroke-width="1.4" opacity="0.6"/>
  <line x1="88" y1="130" x2="212" y2="130" stroke="#60b8e0" stroke-width="1.4" opacity="0.6"/>

  <!-- Headset band arc -->
  <path d="M 94 106 Q 150 50 206 106" fill="none" stroke="url(#blue)" stroke-width="11" stroke-linecap="round"/>

  <!-- Left ear cup -->
  <rect x="78" y="98" width="26" height="42" rx="13" fill="url(#blue)"/>

  <!-- Right ear cup -->
  <rect x="196" y="98" width="26" height="42" rx="13" fill="url(#blue)"/>

  <!-- Mic arm from left ear cup -->
  <path d="M 90 138 Q 64 162 76 180" fill="none" stroke="url(#blue)" stroke-width="7" stroke-linecap="round"/>
  <!-- Mic ball -->
  <circle cx="76" cy="183" r="8" fill="url(#blue)"/>

  <!-- HELLO CORP text -->
  <text x="150" y="234" text-anchor="middle"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="26" font-weight="900" fill="#ffffff" letter-spacing="4">HELLO CORP</text>

  <!-- SERVICE text -->
  <text x="150" y="256" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="12" font-weight="400" fill="#93d4f7" letter-spacing="8">SERVICE</text>
</svg>
