<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#0f2a45"/>
      <stop offset="100%" stop-color="#030a14"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="44%" r="50%">
      <stop offset="0%" stop-color="#3a8fc9" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1060a0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9edcfa"/>
      <stop offset="50%" stop-color="#4baee8"/>
      <stop offset="100%" stop-color="#1a72b8"/>
    </linearGradient>
    <linearGradient id="globe-fill" x1="30%" y1="10%" x2="70%" y2="90%">
      <stop offset="0%" stop-color="#0d2e52"/>
      <stop offset="100%" stop-color="#071828"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>

  <!-- Glow halo behind headset -->
  <circle cx="50" cy="43" r="34" fill="url(#glow)"/>

  <!-- Outer headset ring (light halo) -->
  <circle cx="50" cy="43" r="29" fill="none" stroke="#5bbfee" stroke-width="0.6" opacity="0.35"/>

  <!-- Globe body -->
  <circle cx="50" cy="43" r="19" fill="url(#globe-fill)" stroke="#3a9fd6" stroke-width="1.4"/>

  <!-- Globe latitude lines -->
  <ellipse cx="50" cy="37" rx="19" ry="6.5" fill="none" stroke="#3a9fd6" stroke-width="0.75"/>
  <ellipse cx="50" cy="43" rx="19" ry="9.5" fill="none" stroke="#3a9fd6" stroke-width="0.75"/>
  <ellipse cx="50" cy="49" rx="19" ry="6.5" fill="none" stroke="#3a9fd6" stroke-width="0.75"/>

  <!-- Globe longitude lines -->
  <ellipse cx="50" cy="43" rx="7.5" ry="19" fill="none" stroke="#3a9fd6" stroke-width="0.75"/>
  <ellipse cx="50" cy="43" rx="14" ry="19" fill="none" stroke="#3a9fd6" stroke-width="0.75"/>

  <!-- Globe center cross -->
  <line x1="50" y1="24" x2="50" y2="62" stroke="#3a9fd6" stroke-width="0.75" opacity="0.65"/>
  <line x1="31" y1="43" x2="69" y2="43" stroke="#3a9fd6" stroke-width="0.75" opacity="0.65"/>

  <!-- Headset band arc -->
  <path d="M 25 37 Q 50 11 75 37" fill="none" stroke="url(#hs)" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Left ear cup -->
  <rect x="19.5" y="32" width="9" height="15" rx="4.5" fill="url(#hs)"/>

  <!-- Right ear cup -->
  <rect x="71.5" y="32" width="9" height="15" rx="4.5" fill="url(#hs)"/>

  <!-- Mic arm -->
  <path d="M 25.5 45 Q 13 59 20 70" fill="none" stroke="url(#hs)" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Mic ball -->
  <circle cx="20" cy="72" r="4" fill="url(#hs)"/>
  <circle cx="20" cy="72" r="2" fill="#9edcfa" opacity="0.6"/>
</svg>
